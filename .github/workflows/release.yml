name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore BigBro.sln

      - name: Build
        run: dotnet build BigBro.sln -c Release --no-restore

      - name: Publish Service
        run: |
          dotnet publish src/BigBro.Service -c Release -r win-x64 --self-contained \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --no-restore \
            -o publish

      - name: Publish Collector
        run: |
          dotnet publish src/BigBro.Collector -c Release -r win-x64 --self-contained \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --no-restore \
            -o publish

      - name: Copy tools and config into publish
        run: |
          cp -r tools publish/tools
          cp -r config publish/config

      - name: Create release archive
        run: |
          cd publish
          zip -r ../BigBro-${{ steps.version.outputs.VERSION }}-win-x64.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BigBro v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: BigBro-${{ steps.version.outputs.VERSION }}-win-x64.zip
